# ── Upstream: Daphne (ASGI) replaces Gunicorn (WSGI) atomically ──────────────
# Daphne handles both HTTP and WebSocket upgrades on the same port.
# Do NOT run Gunicorn alongside Daphne — both will attempt to bind :8000.
upstream daphne_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name localhost;

    # ── REST API + WebSocket traffic ─────────────────────────────────────────
    location / {
        proxy_pass http://daphne_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;

        # Required for WebSocket upgrade negotiation
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Allow large video uploads + long CV processing timeouts
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /static/ {
        alias /usr/src/app/static/;
    }

    location /media/ {
        alias /usr/src/app/media/;
    }
}
